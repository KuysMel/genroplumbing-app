    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GENRO Plumbing Services - Professional plumbing solutions for Central Luzon, NCR, and CALABARZON. Available 24/7." />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>GENRO Plumbing Services - Professional Plumbing Solutions</title>
    <script>
      (function(l) {
        if (l.search.startsWith('?p=/')) {
          var decoded = l.search.slice(4).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          });
          var base = l.pathname.endsWith('/') ? l.pathname : l.pathname + '/';
          window.history.replaceState(
            null, null,
            base + decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
